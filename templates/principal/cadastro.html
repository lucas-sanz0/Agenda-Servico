{% extends 'base.html' %}

{% block titulo %}Cadastro - AgendaServiço{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Criar conta</h1>

        <form method="post">
            {% csrf_token %}

            {% for campo in form %}
                <div class="mb-3">
                    <label class="form-label" for="{{ campo.id_for_label }}">{{ campo.label }}</label>
                    {{ campo }}
                    {% if campo.errors %}
                        <div class="text-danger small">{{ campo.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-success">Cadastrar</button>
        </form>
    </div>
</div>
{% endblock %}
